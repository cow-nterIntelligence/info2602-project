<h2>Bulls & Cows — Daily Puzzle</h2>
{% if solved %}
  <p>You already solved today's puzzle. Come back tomorrow!</p>
{% else %}
  <form method="post" action="{{ request.url_for('game_guess') }}">
    <input name="guess" maxlength="4" pattern="\d{4}" required>
    <button type="submit">Guess</button>
  </form>
{% endif %}
<h3>Your guesses today:</h3>
<ul>
{% for g in guesses %}
  <li>{{ g.guess }} — Bulls: {{ g.bulls }}, Cows: {{ g.cows }} ({{ g.timestamp }})</li>
{% endfor %}
</ul>
<a href="{{ request.url_for('game_history') }}">View history</a>
