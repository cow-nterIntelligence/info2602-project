<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Bulls & Cows{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', path='css/style.css') }}">
    {% block head_extra %}{% endblock %}
</head>
<body>
<div class="game-container">
    <aside class="sidebar">
        <div>
            <div class="game-title">Bulls & Cows</div>
            <nav>
                <a class="{% if active_page=='game' %}active{% endif %}" href="/app">🎲 Game</a>
                <a class="{% if active_page=='leaderboard' %}active{% endif %}" href="/leaderboard">🏆 Leaderboard</a>
                <a class="{% if active_page=='history' %}active{% endif %}" href="/history">📊 Play History</a>
            </nav>
        </div>
        <div>
            <a class="logout" href="/logout">Logout 👋</a>
        </div>
    </aside>
    <main class="game-panel">
        {% block body %}{% endblock %}
    </main>
</div>
</body>
</html>
