<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulls & Cows | Register</title>
    <!-- Google Fonts: Fredoka One for cartoon style -->
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
    <style>
        /* -- USE THE SAME CSS AS LOGIN PAGE -- */
        body {
            font-family: 'Fredoka One', Arial, sans-serif;
            background: linear-gradient(135deg, #fff7e6 0%, #ffe2c2 100%);
            min-height: 100vh;
            margin: 0;
        }
        .container {
            margin: auto;
            margin-top: 7vh;
            background: #fffee5;
            border-radius: 1.4em;
            box-shadow: 0 8px 32px rgba(80,40,0,0.17);
            width: 410px;
            max-width: 97vw;
            padding: 2.2em 2.2em 1em 2.2em;
            text-align: center;
            border: 3px dashed #ffb43a;
        }
        .mascot {
            font-size: 3em;
            margin-bottom: 0.25em;
            animation: bounce 2s infinite;
            text-shadow: 2px 6px 9px #ffdeab55;
            user-select: none;
        }
        @keyframes bounce {
            0%, 100% { transform:translateY(0);}
            50% { transform:translateY(-16px);}
        }
        h1 {
            margin-bottom: 0.15em;
            color: #ffb43a;
            font-family: 'Fredoka One', Arial, sans-serif;
            font-size: 2.2em;
            letter-spacing: 0.04em;
            text-shadow: 2px 4px 10px #ede6c1bd;
        }
        .desc {
            color: #ae8602;
            font-size: 1.11em;
            margin-bottom: 1em;
            line-height: 1.4;
            font-family: 'Fredoka One', Arial, sans-serif;
        }
        form {
            margin-top: 0.7em;
            display: flex;
            flex-direction: column;
            align-items: stretch;
            gap: 1em;
        }
        input[type="text"], input[type="password"], input[type="email"] {
            padding: 0.74em;
            border: 2px solid #ffdc8a;
            border-radius: 0.8em;
            background: #fffdf5;
            font-size: 1.15em;
            font-family: 'Fredoka One', Arial, sans-serif;
            color: #a2690c;
            box-shadow: 0 2px 8px #ffe5b3;
            transition: border .2s, box-shadow .2s;
        }
        input[type="text"]:focus, input[type="password"]:focus, input[type="email"]:focus {
            outline: none;
            border: 2px solid #ffb43a;
            background: #fff9e6;
            box-shadow: 0 2px 10px #ffd580bd;
        }
        input[type="submit"], button {
            background: linear-gradient(90deg, #ffa71f 30%, #ffcb7e 100%);
            color: #533800;
            font-size: 1.2em;
            font-family: 'Fredoka One', Arial, sans-serif;
            font-weight: 700;
            border: none;
            border-radius: 0.7em;
            padding: 0.8em;
            cursor: pointer;
            margin-top: 0.2em;
            transition: filter 0.16s, box-shadow 0.15s;
            box-shadow: 0 4px 16px #ffa82a16;
        }
        input[type="submit"]:hover, button:hover {
            filter: brightness(0.96);
            box-shadow: 0 2px 24px #ffa82a28;
        }
        .register-link {
            margin-top: 1.2em;
            font-size: 1em;
            font-family: 'Fredoka One', Arial, sans-serif;
        }
        .register-link a {
            color: #d97400;
            text-decoration: none;
            font-weight: 600;
            margin-left: 0.1em;
        }
        .register-link a:hover {
            text-decoration: underline;
        }
        .flash {
            margin-bottom: 1em;
            padding: 0.98em 1.3em;
            border-radius: 0.6em;
            font-weight: 550;
            font-family: 'Fredoka One', Arial, sans-serif;
            text-align: left;
            font-size: 1.05em;
        }
        .flash.danger { background: #ffebe7; color: #a30808; border: 2px solid #ffa99d; animation: shake 0.45s cubic-bezier(.36,.07,.19,.97) both;}
        .flash.success { background: #e7ffe7; color: #177619; border: 2px solid #86ff94; }
        .flash.info { background: #e7f2ff; color: #114977; border: 2px solid #91baff; }
        /* Wiggle Animation */
        @keyframes shake {
            0%, 100% { transform:translateX(0);}
            20%, 60% { transform:translateX(-9px);}
            40%, 80% { transform:translateX(9px);}
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="mascot" title="Bulls and Cows">🐂 🐄</div>
        <h1>Bulls & Cows</h1>
        <div class="desc">
            <span>Join the Herd! Make an account to play Bulls & Cows and track your wins.</span>
        </div>
        <!-- FLASH MESSAGES -->
        {% for message in get_flashed_messages(request) %}
        <div class="flash {{ message.type }}">
          {{ message.message }}
        </div>
        {% endfor %}
        <!-- REGISTER FORM -->
        <form method="post" action="{{ request.url_for('signup_user') }}">
            <input autocomplete="username" required type="text" name="username" placeholder="Choose a nickname">
            <input autocomplete="email" required type="email" name="email" placeholder="Email address">
            <input autocomplete="new-password" required type="password" name="password" placeholder="Create a password">
            <input type="submit" value="Become a Codebreaker! 🐮">
        </form>
        <div class="register-link">
            Already have an account?
            <a href="{{ request.url_for('login_view') }}">Login here!</a>
        </div>
    </div>
</body>
</html>
